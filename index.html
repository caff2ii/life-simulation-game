<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的社畜人生</title>
    <style>
        :root {
            --game-bg: #0f141c;        /* 現代遊戲極致深藍底 */
            --game-card: #18202c;      /* 現代扁平化高質感面板 */
            --game-cyber: #00f0ff;     /* 螢光科技藍 */
            --game-green: #39e6a0;     /* 生命值/初始數據綠 */
            --game-gold: #ffc83b;      /* 神聖/史詩級裝備金 */
            --game-accent: #ff4a6b;    /* 任務/警告紅 */
            --text-main: #ffffff;      /* 主文字 */
            --text-sub: #7a8b9e;       /* 副文字 */
            --border-ui: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--game-bg);
            color: var(--text-main);
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* 現代遊戲式簡約標題 */
        h1 {
            text-align: center;
            color: var(--text-main);
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 2px;
            margin: 8px 0 16px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--game-cyber);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        /* 現代開放世界遊戲面板 */
        .game-panel {
            background-color: var(--game-card);
            border: 1px solid var(--border-ui);
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        .welcome-screen {
            text-align: center;
            padding: 30px 15px;
        }

        /* Modern UI 按鈕 */
        .btn {
            background: linear-gradient(90deg, #1f2d3d 0%, #151f2b 100%);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            border-radius: 6px;
            box-sizing: border-box;
            transition: all 0.15s ease;
            margin-top: 12px;
        }

        .btn:active {
            background: var(--game-cyber);
            color: #000;
            border-color: var(--game-cyber);
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.4);
        }

        .btn-bless {
            border-color: var(--game-gold);
            color: var(--game-gold);
            background: rgba(255, 200, 59, 0.05);
        }
        
        .btn-bless:active {
            background: var(--game-gold);
            color: #000;
            box-shadow: 0 0 12px rgba(255, 200, 59, 0.4);
        }

        /* 一頁式緊湊型表格 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 6px 0;
            text-align: center;
        }

        th, td {
            padding: 6px 2px;
            font-size: 14px;
        }

        th {
            color: var(--text-sub);
            font-weight: 500;
            font-size: 11px;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-ui);
        }

        /* 螢光數據發光效果 */
        .val-baseline {
            font-size: 16px;
            font-weight: bold;
            color: var(--game-green);
        }

        .val-goal {
            font-size: 15px;
            font-weight: 500;
            color: #ffffff;
        }

        /* 聖經應許卡片：插在中間不阻位 */
        .promise-box {
            color: var(--game-gold);
            background: rgba(255, 200, 59, 0.06);
            padding: 10px;
            border-radius: 6px;
            margin: 4px 0 10px 0;
            line-height: 1.4;
            font-size: 13px;
            border: 1px solid rgba(255, 200, 59, 0.2);
            text-align: center;
        }

        .bless-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 6px;
            text-align: center;
        }

        .bless-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 4px;
            font-size: 13px;
            color: var(--game-gold);
            border-radius: 4px;
            border: 1px dashed rgba(255, 200, 59, 0.3);
        }

        /* 極簡指令輸入框 */
        .input-code {
            width: 100%;
            padding: 10px;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
            background-color: rgba(0, 0, 0, 0.2);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            margin-bottom: 4px;
            text-align: center;
            text-transform: uppercase;
            outline: none;
        }
        
        .input-code:focus {
            border-color: var(--game-cyber);
        }

        .hidden {
            display: none !important;
        }

        .panel-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-sub);
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        /* Admin 面板 */
        .admin-box {
            border: 1px dashed var(--game-accent);
            background-color: rgba(255, 74, 107, 0.05);
            padding: 10px;
            margin-top: 10px;
            text-align: center;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="game-title" onclick="handleTitleClick()">我的社畜人生</h1>

    <div id="start-screen" class="game-panel welcome-screen">
        <p style="font-size: 14px; line-height: 1.6; margin-bottom: 20px; color: var(--text-sub);">
            [ 系統提示 ]<br>
            現實關卡極具挑戰，世界線已準備就緒。<br>請加載屬於你嘅初始數據與人生終極目標。
        </p>
        <button class="btn" onclick="drawFate()">加載專屬劇本</button>
    </div>

    <div id="main-screen" class="hidden">
        
        <div class="game-panel">
            <div class="panel-label" style="color: var(--game-green);">◆ CURRENT STATUS (初始數據)</div>
            <table>
                <tr>
                    <th>金錢</th><th>愛情</th><th>親情</th><th>智慧</th><th>靈命</th><th>健康</th>
                </tr>
                <tr>
                    <td id="b-money" class="val-baseline">-</td>
                    <td id="b-love" class="val-baseline">-</td>
                    <td id="b-family" class="val-baseline">-</td>
                    <td id="b-wisdom" class="val-baseline">-</td>
                    <td id="b-spirit" class="val-baseline">-</td>
                    <td id="b-health" class="val-baseline">-</td>
                </tr>
            </table>
        </div>

        <div id="bless-display-zone" class="game-panel hidden" style="border-color: var(--game-gold); background: linear-gradient(180deg, rgba(255,200,59,0.05) 0%, rgba(24,32,44,1) 100%);">
            <div class="panel-label" style="color: var(--game-gold); margin-bottom: 6px;">◆ DIVINE COVENANT (已解鎖恩典應許)</div>
            <div class="promise-box">
                「看哪，我必與你同在，無論你往哪裏去，我必保佑你，領你歸回這地。我總不離棄你，直到我實現了對你所說的話。」<br>
                <span style="font-size: 11px; opacity: 0.7;">— 創世記 28:15</span>
            </div>
            <div id="bless-rewards" class="bless-grid">
                </div>
        </div>

        <div class="game-panel">
            <div class="panel-label" id="admin-trigger" onclick="handleAdminClick()" style="cursor: pointer; user-select: none; color: var(--game-cyber);">◆ MAIN QUEST (終極人生目標)</div>
            <div id="goal-name" style="font-size: 13px; color: var(--text-main); background: rgba(0,0,0,0.15); padding: 8px 10px; border-radius: 4px; margin-bottom: 8px; line-height: 1.4; border-left: 3px solid var(--game-cyber);">
                -
            </div>
            <table>
                <tr>
                    <th>金錢</th><th>愛情</th><th>親情</th><th>智慧</th><th>靈命</th><th>健康</th>
                </tr>
                <tr>
                    <td id="g-money" class="val-goal">-</td>
                    <td id="g-love" class="val-goal">-</td>
                    <td id="g-family" class="val-goal">-</td>
                    <td id="g-wisdom" class="val-goal">-</td>
                    <td id="g-spirit" class="val-goal">-</td>
                    <td id="g-health" class="val-goal">-</td>
                </tr>
            </table>
        </div>

        <div id="bless-trigger-zone" class="game-panel hidden" style="border-color: var(--game-accent); text-align: center; padding: 10px;">
            <div class="panel-label" style="color: var(--game-accent); margin-bottom: 6px;">◆ SECURITY LOCK (開啟恩典)</div>
            <input type="text" id="bless-code" class="input-code" placeholder="輸入神秘代碼">
            <button class="btn btn-bless" style="margin-top: 4px; padding: 8px;" onclick="checkBlessCode()">解鎖應許</button>
        </div>

        <div id="admin-panel" class="admin-box hidden">
            <button class="btn" style="border-color: var(--game-accent); color: var(--game-accent); margin-top: 0; padding: 6px; font-size: 12px; background: none;" onclick="resetAllData()">重置數據 (重新抽籤)</button>
        </div>

    </div>
</div>

<script>
    const blueprints = {
        1: {
            baseline: { money: 5, love: 1, family: 3, wisdom: 1, spirit: 1, health: 1 },
            goal: { name: "「你現在躺臥之地，我要將它賜給你和你的後裔。」(創 28:13)", money: 20, love: 10, family: 0, wisdom: 0, spirit: 20, health: 0 },
            bless: { money: 10, love: 5, family: 0, wisdom: 0, spirit: 10, health: 0 }
        },
        2: {
            baseline: { money: 3, love: 5, family: 1, wisdom: 1, spirit: 1, health: 1 },
            goal: { name: "「你的後裔必像地上的塵沙，必向東西南北開展。」(創 28:14)", money: 0, love: 20, family: 10, wisdom: 0, spirit: 20, health: 0 },
            bless: { money: 0, love: 10, family: 5, wisdom: 0, spirit: 10, health: 0 }
        },
        3: {
            baseline: { money: 1, love: 3, family: 5, wisdom: 1, spirit: 1, health: 1 },
            goal: { name: "「...我必與你同在，無論你往哪裏去，我必保佑你，領你歸回這地...」(創 28:15)", money: 0, love: 0, family: 0, wisdom: 20, spirit: 20, health: 10 },
            bless: { money: 0, love: 0, family: 0, wisdom: 10, spirit: 10, health: 5 }
        }
    };

    const CORRECT_CODE = "GRACE"; 
    let titleClickCount = 0;      
    let adminClickCount = 0;

    window.onload = function() {
        const savedId = localStorage.getItem('simLife_dramaId');
        if (savedId) {
            showMainScreen(savedId);
        }
        
        if (localStorage.getItem('simLife_isBlessed') === 'true' && savedId) {
            renderBlessingValues(savedId);
            document.getElementById('bless-display-zone').classList.remove('hidden');
        }
    };

    // 連擊大標題 5 次開啟密碼輸入框
    function handleTitleClick() {
        if (!localStorage.getItem('simLife_dramaId')) return;
        if (localStorage.getItem('simLife_isBlessed') === 'true') return;

        titleClickCount++;
        if (titleClickCount >= 5) {
            document.getElementById('bless-trigger-zone').classList.remove('hidden');
            titleClickCount = 0; 
        }
    }

    // 連擊 MAIN QUEST 5 次開啟 Admin 面板
    function handleAdminClick() {
        if (!localStorage.getItem('simLife_dramaId')) return;

        adminClickCount++;
        if (adminClickCount >= 5) {
            document.getElementById('admin-panel').classList.remove('hidden');
            adminClickCount = 0;
        }
    }

    function resetAllData() {
        if (confirm("確定要重置數據並重新抽籤嗎？")) {
            localStorage.removeItem('simLife_dramaId');
            localStorage.removeItem('simLife_isBlessed');
            window.location.reload();
        }
    }

    function drawFate() {
        const array = new Uint32Array(1);
        window.crypto.getRandomValues(array);
        const randomId = (array[0] % 3) + 1;
        
        localStorage.setItem('simLife_dramaId', randomId);
        showMainScreen(randomId);
    }

    function showMainScreen(id) {
        const data = blueprints[id];
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');

        document.getElementById('b-money').innerText = data.baseline.money;
        document.getElementById('b-love').innerText = data.baseline.love;
        document.getElementById('b-family').innerText = data.baseline.family;
        document.getElementById('b-wisdom').innerText = data.baseline.wisdom;
        document.getElementById('b-spirit').innerText = data.baseline.spirit;
        document.getElementById('b-health').innerText = data.baseline.health;

        document.getElementById('g-money').innerText = data.goal.money;
        document.getElementById('g-love').innerText = data.goal.love;
        document.getElementById('g-family').innerText = data.goal.family;
        document.getElementById('g-wisdom').innerText = data.goal.wisdom;
        document.getElementById('g-spirit').innerText = data.goal.spirit;
        document.getElementById('g-health').innerText = data.goal.health;
        document.getElementById('goal-name').innerText = data.goal.name;
    }

    function checkBlessCode() {
        const inputCode = document.getElementById('bless-code').value.trim().toUpperCase();
        
        if (inputCode === CORRECT_CODE) {
            const id = localStorage.getItem('simLife_dramaId');
            localStorage.setItem('simLife_isBlessed', 'true');
            
            renderBlessingValues(id);
            document.getElementById('bless-trigger-zone').classList.add('hidden');
            document.getElementById('bless-display-zone').classList.remove('hidden');
        } else {
            alert("[ ERROR ] CODE INVALID.");
        }
    }

    function renderBlessingValues(id) {
        const data = blueprints[id];
        const blessData = data.bless;
        let rewardsHtml = "";
        const translate = { money: "金錢", love: "愛情", family: "親情", wisdom: "智慧", spirit: "靈命", health: "健康" };
        
        for (let key in blessData) {
            if (blessData[key] > 0) {
                rewardsHtml += `<div class="bless-item">◆ ${translate[key]} +${blessData[key]}</div>`;
            }
        }
        document.getElementById('bless-rewards').innerHTML = rewardsHtml;
    }
</script>

</body>
</html>
